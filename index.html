<html>
<body style="margin:0;background:#0b0b0b;font-family:monospace;color:white;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="width:900px;background:#111;border:1px solid #333;border-radius:10px;padding:30px;box-shadow:0 0 25px #000;">

<h1 style="text-align:center;color:#00ff9d;text-shadow:0 0 10px #00ff9d;">Lua Protector</h1>

<p style="text-align:center;color:#888;">Paste Lua script and protect it</p>

<textarea id="input" style="
width:100%;
height:180px;
background:#000;
border:1px solid #333;
color:#00ff9d;
padding:10px;
border-radius:6px;
resize:none;
">
print("hello world")
</textarea>

<br><br>

<div style="text-align:center;">

<button onclick="protect()" style="
background:#00ff9d;
border:none;
padding:10px 30px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
">
Protect Script
</button>

<button onclick="copyOutput()" style="
background:#222;
border:none;
padding:10px 30px;
border-radius:6px;
color:white;
margin-left:10px;
cursor:pointer;
">
Copy Output
</button>

</div>

<br>

<textarea id="output" placeholder="Protected Lua will appear here..." style="
width:100%;
height:180px;
background:#000;
border:1px solid #333;
color:#00ff9d;
padding:10px;
border-radius:6px;
resize:none;
"></textarea>

</div>

<script src="https://unpkg.com/fengari-web/dist/fengari-web.js"></script>

<script>

function protect(){

var userLua=document.getElementById("input").value

var luaCode=`
local a=[=[${userLua}]=]

local function enc(s)

local words={"'return'","'elseif'","'then'"}
local t={}
local len=#s

for i=1,len do
t[#t+1]="["..i.."]="..string.byte(s,i)

t[#t+1]="["..(len+i).."]="..words[math.random(#words)]
t[#t+1]="["..(len+i+len).."]="..words[math.random(#words)]
t[#t+1]="["..(len+i+len*2).."]="..words[math.random(#words)]
t[#t+1]="["..(len+i+len*3).."]="..words[math.random(#words)]
t[#t+1]="["..(len+i+len*4).."]="..words[math.random(#words)]
end

local code=
"local _E=_ENV or getfenv() "
.."local d=_E.string "
.."local f=_E.loadstring or _E.load "
.."local b={"..table.concat(t,",").."} "
.."local s='' "
.."for i=1,"..len.." do s=s..d.char(b[i]) end "
.."f(s)() "

return code
end

return enc(a)
`

var result=fengari.load(luaCode)()

document.getElementById("output").value=result

}

function copyOutput(){

var text=document.getElementById("output")

text.select()
document.execCommand("copy")

}

</script>

</body>
</html>
