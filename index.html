<body>

<h2>Viterveral Lua Obfuscator</h2>

<textarea id="input" placeholder="Paste Lua script"></textarea>
<br>
<button onclick="obfuscate()">Obfuscate</button>
<textarea id="output"></textarea>

<script>

function r(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function randName(){
let chars="abcdefghijklmnopqrstuvwxyz"
let name="_"
for(let i=0;i<8;i++){
name+=chars[r(0,chars.length-1)]
}
return name
}

function fakeExpr(){
let arr=[
"t["+r(1,200)+"]",
"t[t]",
r(100000,999999999),
r(10000,999999)
]
return arr[r(0,arr.length-1)]
}

function junk(tbl){
let j=[
"if "+tbl+"["+r(1,200)+"] then elseif "+tbl+"["+r(1,200)+"] then end;",
"if "+tbl+"["+r(1,200)+"] and not "+tbl+"["+r(1,200)+"] then local a="+r(1,9)+" end;",
"while false do end;"
]
return j[r(0,j.length-1)]
}

function randomTable(size){
let arr=[]
for(let i=0;i<size;i++){
arr.push(r(10000,999999999))
}
return "{"+arr.join(",")+"}"
}

function obfuscate(){

let code=document.getElementById("input").value

let key1=r(20,120)
let key2=r(5,60)

let enc=[]

for(let i=0;i<code.length;i++){

let byte=code.charCodeAt(i)

let dynamic=(key1+i*7)%255

let encrypted=((byte ^ dynamic)+key2) ^ key1

enc.push(encrypted)

for(let j=0;j<r(1,3);j++){
enc.push(fakeExpr())
}

}

let fake1=randomTable(40)
let fake2=randomTable(50)
let fake3=randomTable(60)

let v1=randName()
let v2=randName()
let v3=randName()

let result="local a="+fake1+";"
result+="local b="+fake2+";"
result+="local c="+fake3+";"

result+="local t={"+enc.join(",")+"};"

result+="local "+v1+"='';"
result+="local "+v2+"=load;"
result+="local "+v3+"=string.char;"

result+="local p=1;"

result+="for i=1,#t do "

for(let j=0;j<6;j++){
result+=junk("t")
}

result+="local v=t[i];"
result+="if type(v)=='number' then "

result+="local dyn=(("+key1+")+p*7)%255;"
result+="local d=((v ~ "+key1+")-"+key2+") ~ dyn;"
result+=v1+"="+v1+".."+v3+"(d);"
result+="p=p+1;"

result+="end;"

for(let j=0;j<6;j++){
result+=junk("t")
}

result+=" end;"

result+=v2+"("+v1+")();"

document.getElementById("output").value=result

}

</script>
